<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> ACCO Hôpital- Rendez-vous</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-branding">
        <div class="logo">
          <a href="index.html"><img src="images/logo.png" alt="Logo de l'hôpital ITAC"></a>
        </div>
        <div class="brand">
          <h1>ACCO Hôpital</h1>
          <p>Soins, confiance et innovation</p>
        </div>
      </div>

      <div class="header-actions">
        <div class="lang-select">
          <label for="lang" class="sr-only">Langue</label>
          <select id="lang" aria-label="Choisir la langue">
            <option value="fr">Français</option>
            <option value="en">English</option>
          </select>
        </div>
        <button class="menu-toggle" type="button" aria-label="Ouvrir le menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="main-nav">
        <a href="index.html">Accueil</a>
        <a href="a-propos.html">À propos</a>
        <a href="services.html">Services</a>
        <a href="medecins.html">Médecins</a>
        <a href="rendez-vous.html">Rendez-vous</a>
        <a href="urgences.html">Urgences</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="page-title">
      <h2>Prendre rendez-vous</h2>
      <p>Remplissez le formulaire pour réserver votre consultation rapidement.</p>
    </section>

    <section class="form-section booking-hero">
      <form action="#" method="post" class="booking-form">
        <div class="form-group">
          <label for="nom">Nom complet</label>
          <input type="text" id="nom" name="nom" required placeholder="Votre nom complet">
        </div>
        <div class="form-group">
          <label for="date">Date souhaitée</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-group">
          <label for="heure">Heure</label>
          <input type="time" id="heure" name="heure" required>
        </div>
        <div class="form-group">
          <label for="service">Service</label>
          <select id="service" name="service" required>
            <option value="">Sélectionner un service</option>
            <option value="pediatrie">Pédiatrie</option>
            <option value="cardiologie">Cardiologie</option>
            <option value="radiologie">Radiologie</option>
            <option value="gynecologie">Gynécologie</option>
            <option value="chirurgie">Chirurgie générale</option>
          </select>
        </div>
        <div class="form-group form-actions">
          <button type="submit" class="btn">Envoyer</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 ACCO Hôpital</p>
    </div>
  </footer>
  <script src="js/mobile-nav.js"></script>
</body>
</html>
